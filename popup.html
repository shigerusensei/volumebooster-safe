<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Volume Booster Safe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:      #111118;
      --surface: #1c1c28;
      --border:  #2a2a3a;
      --accent:  #6d5aff;
      --accent-dim: #3d3170;
      --text:    #e8e8f0;
      --sub:     #6b6b80;
      --red:     #e05252;
      --red-dim: #3a1f1f;
    }

    body {
      width: 260px;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      animation: open .22s cubic-bezier(.4,0,.2,1) both;
    }

    @keyframes open {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* ── header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--border);
    }

    .icon-wrap {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 0 transparent; }
      50%       { box-shadow: 0 0 10px 2px #6d5aff44; }
    }

    .icon-wrap svg {
      width: 16px;
      height: 16px;
      fill: #a09aff;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -.1px;
      color: var(--text);
    }

    .safe-tag {
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 500;
      color: var(--sub);
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #4ade80;
      animation: blink 2s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    /* ── body ── */
    .body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* volume row */
    .vol-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .vol-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .vol-num {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      transition: color .15s;
    }

    /* slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slider-row svg {
      width: 13px;
      height: 13px;
      fill: var(--sub);
      flex-shrink: 0;
    }

    .range {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 99px;
      background: linear-gradient(
        to right,
        var(--accent) var(--pct, 33%),
        var(--border) var(--pct, 33%)
      );
      outline: none;
      cursor: pointer;
      transition: height .15s;
    }

    .range:hover { height: 6px; }

    .range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 2px var(--accent);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }

    .range::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 0 3px var(--accent), 0 2px 10px #6d5aff55;
    }

    .range:active::-webkit-slider-thumb {
      transform: scale(.93);
    }

    /* meter */
    .meter {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 11px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .meter-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .meter-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .meter-top svg {
      width: 11px;
      height: 11px;
      fill: var(--sub);
    }

    .bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      width: 33%;
      transition: width .3s cubic-bezier(.4,0,.2,1), background .3s;
      position: relative;
      overflow: hidden;
    }

    .bar-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, #ffffff28, transparent);
      animation: sweep 2s ease infinite;
    }

    @keyframes sweep {
      from { transform: translateX(-100%); }
      to   { transform: translateX(200%);  }
    }

    /* button */
    .btn-off {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px 0;
      background: var(--red-dim);
      border: 1px solid #5a2323;
      border-radius: 7px;
      color: var(--red);
      font-size: 12px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: .2px;
      transition: background .15s, border-color .15s, transform .1s;
    }

    .btn-off svg {
      width: 12px;
      height: 12px;
      fill: var(--red);
      flex-shrink: 0;
    }

    .btn-off:hover {
      background: #4a1e1e;
      border-color: var(--red);
    }

    .btn-off:active {
      transform: scale(.97);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
    </div>
    <div>
      <div class="title">Volume Booster Safe</div>
      <div class="safe-tag">
        <span class="dot"></span>
        Tracker-free
      </div>
    </div>
  </div>

  <div class="body">

    <div class="vol-row">
      <span class="vol-label">Boost</span>
      <span class="vol-num" id="vol-display">100%</span>
    </div>

    <div class="slider-row">
      <svg viewBox="0 0 24 24"><path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>
      <input id="slide" class="range" type="range" min="0" max="6" step="0.25" value="2">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/></svg>
    </div>

    <div class="meter">
      <div class="meter-top">
        <span class="meter-label">Signal Boost</span>
        <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      </div>
      <div class="bar-bg">
        <div class="bar-fill" id="meter-fill"></div>
      </div>
    </div>

    <button id="button" class="btn-off">
      <svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
      Turn Off
    </button>

  </div>

  <script src="popup.js"></script>
</body>
</html>
